
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spero | Premium Architectural Finishes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#00A550',
                dark: '#008540',
                black: '#000000',
                zinc: '#0a0a0a'
              }
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            letterSpacing: {
              'ultra-wide': '0.5em',
            },
            animation: {
              'slow-pan': 'pan 30s linear infinite',
              'reveal': 'reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards',
              'spin-slow': 'spin 8s linear infinite',
            },
            keyframes: {
              pan: {
                '0%, 100%': { transform: 'scale(1) translate(0, 0)' },
                '50%': { transform: 'scale(1.1) translate(-1%, -1%)' },
              },
              reveal: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #000000;
      }
      .dark {
        --bg-color: #000000;
        --text-color: #ffffff;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #00A550; }
      
      .cement-overlay {
        background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
        opacity: 0.03;
        pointer-events: none;
      }
      
      .text-reveal {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
      }

      * {
        transition-property: background-color, border-color, color, fill, stroke;
        transition-duration: 500ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body>
    <div class="cement-overlay fixed inset-0 z-[100]"></div>
    <div id="root"></div>
    <!-- Explicit link to the entry point for Vercel/Vite build -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
